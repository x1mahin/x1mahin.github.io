<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mahin Sheikh | Profile</title>
    <style>
        /* ফন্ট ইমপোর্ট */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        /* রিসেট এবং বেসিক সেটিংস */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #ffffff; /* পিওর হোয়াইট ব্যাকগ্রাউন্ড */
            color: #2d3142;            /* সফট চারকোল টেক্সট */
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 50px 20px;
        }

        /* মেইন কন্টেইনার */
        .wrapper {
            max-width: 650px;
            width: 100%;
            text-align: center;
        }

        /* প্রোফাইল আইকন এরিয়া */
        .avatar-space {
            margin-bottom: 20px;
        }

        .avatar-space svg {
            width: 64px;
            height: 64px;
            fill: none;
            stroke: #df8543; /* ক্ল্যাসিক ওয়ার্ম অরেঞ্জ/টেরা-কোটা টোন */
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* নাম ও অ্যাক্টিভ স্ট্যাটাস ইন্ডিকেটর */
        .status-indicator {
            display: inline-flex;
            align-items: center;
            background-color: #f5f6f8; /* লাইট গ্রে ব্যাকগ্রাউন্ড ব্যাজ */
            border: 1px solid #e2e4e9;
            padding: 8px 18px;
            border-radius: 100px;
            font-size: 0.95rem;
            color: #2d3142;
            font-weight: 600;
            margin-bottom: 30px;
            letter-spacing: 0.2px;
        }

        .live-dot {
            width: 8px;
            height: 8px;
            background-color: #4b8f56; /* সফট গ্রিন */
            border-radius: 50%;
            margin-right: 10px;
            position: relative;
        }

        .live-dot::after {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            background-color: #4b8f56;
            border-radius: 50%;
            animation: blink 2s infinite;
        }

        @keyframes blink {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        /* মেইন ইনফো বক্স */
        .profile-card {
            background-color: #ffffff; 
            border: 1px solid #e2e4e9;   /* পিওর হোয়াইটের সাথে ম্যাচিং লাইট বর্ডার */
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 30px;
            text-align: left;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04); /* অত্যন্ত মৃদু শ্যাডো */
        }

        .card-section {
            margin-bottom: 25px;
        }

        .card-section:last-child {
            margin-bottom: 0;
        }

        .label-title {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #7a8293;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .info-detail {
            color: #1a1d24;
            font-size: 1rem;
            font-weight: 500;
        }

        /* সাইড-বাই-সাইড লিংক গ্রিড */
        .links-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 12px;
        }

        .link-block {
            display: flex;
            align-items: center;
            background-color: #f8f9fa; /* হালকা অফ-হোয়াইট বাটন ব্যাকগ্রাউন্ড */
            border: 1px solid #e2e4e9;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.2s ease-in-out;
        }

        .link-block:hover {
            border-color: #df8543; 
            background-color: #ffffff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(223, 133, 67, 0.08);
        }

        /* বাম পাশের বাটন পার্ট */
        .block-label {
            background-color: #edf0f2;
            color: #4a4d5c;
            padding: 12px 16px;
            font-size: 0.85rem;
            font-weight: 600;
            min-width: 100px;
            text-align: center;
            border-right: 1px solid #e2e4e9;
        }

        /* ডান পাশের লিংক পার্ট */
        .block-target {
            color: #5c6175;
            text-decoration: none;
            padding: 12px 14px;
            font-size: 0.9rem;
            font-weight: 400;
            flex-grow: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: color 0.15s;
        }

        .link-block:hover .block-target {
            color: #df8543;
            font-weight: 500;
        }

        /* স্পেশাল হাইলাইট: মেইন ওয়েবসাইট বাটন */
        .link-block.main-site {
            border-color: #df8543;
            background-color: rgba(223, 133, 67, 0.02);
        }

        .link-block.main-site .block-label {
            background-color: #df8543;
            color: #ffffff;
            border-right-color: #df8543;
        }

        .link-block.main-site:hover {
            box-shadow: 0 4px 12px rgba(223, 133, 67, 0.15);
        }

        /* ট্র্যাডিশনাল ক্লিন ফুটার */
        footer {
            font-size: 0.85rem;
            color: #7a8293;
            line-height: 1.5;
        }

        footer strong {
            color: #2d3142;
            font-weight: 600;
        }

        footer span {
            display: block;
            margin-top: 4px;
            font-size: 0.8rem;
            color: #a0a6b5;
        }
    </style>
</head>
